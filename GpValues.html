<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NB虚拟股票</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            padding: 28px 32px 16px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.5);
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #5a6e7c;
            margin-top: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .update-badge {
            background: #eef2f6;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a6e;
        }
        .toolbar {
            padding: 20px 32px 12px 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #eef2f8;
            background: #ffffffd9;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            background: #f0f4f9;
            padding: 6px;
            border-radius: 60px;
        }
        .chart-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: #3e5a6b;
        }
        .chart-btn.active {
            background: #2c5a6e;
            color: white;
            box-shadow: 0 4px 8px rgba(44, 90, 110, 0.2);
        }
        .refresh-btn {
            background: #2c5a6e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #1f4456;
            transform: scale(0.96);
        }
        .chart-wrapper {
            padding: 20px 32px 32px 32px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 8px 8px 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }
        canvas {
            max-height: 520px;
            width: 100%;
        }
        .stats {
            padding: 16px 32px 28px 32px;
            border-top: 1px solid #eef2f8;
            background: #fbfdff;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.85rem;
            color: #2c5a6e;
        }
        .stat-card {
            background: #f5f9fe;
            border-radius: 28px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-label { font-weight: 600; }
        .stat-value {
            font-weight: 700;
            color: #1f4d62;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .error-msg {
            color: #c7362b;
            background: #ffeae8;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        .proxy-note {
            font-size: 0.7rem;
            margin-top: 12px;
            text-align: center;
            color: #6f8e9f;
        }
        @media (max-width: 680px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .refresh-btn { margin-left: 0; }
            .chart-wrapper { padding: 16px; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>📊 NB虚拟股票（数据来自Orgent）</h1>
        <div class="sub">
            <span>📈 股票/概念指数 动态追踪</span>
            <span class="update-badge" id="dataTimestamp">⚡ 数据加载中...</span>
        </div>
    </div>
    <div class="toolbar">
        <div class="btn-group">
            <button class="chart-btn active" id="barBtn">📊 柱状图</button>
            <button class="chart-btn" id="lineBtn">📈 折线图</button>
        </div>
        <button class="refresh-btn" id="refreshDataBtn">🔄 刷新行情</button>
    </div>
    <div class="chart-wrapper">
        <div class="canvas-container">
            <canvas id="stockChart" width="1100" height="500"></canvas>
        </div>
    </div>
    <div class="stats" id="statsPanel">
        <div>📡 正在从服务器获取股票估值……</div>
    </div>
</div>
<div class="proxy-note">
    ⚡ 若首次加载失败，请点击“刷新行情”重试（使用 CORS 代理）<br>
    代理服务可能会有限速，如长期使用建议自建 Cloudflare Worker 代理。
</div>

<script>
    let currentChart = null;
    let currentChartType = 'bar';
    let rawData = { names: [], values: [] };
    let isLoading = false;

    const API_ORIGIN = 'https://orgent.pythonanywhere.com/api/GpValues';
    // 公共 CORS 代理（稳定但可能有频率限制）
    const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
    let useProxy = true;  // 默认使用代理

    function formatValue(num) {
        if (num === undefined || num === null) return '0';
        const n = Number(num);
        if (isNaN(n)) return '0';
        if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
        if (n >= 10000) return (n / 10000).toFixed(1) + '万';
        return n.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function fetchStockData() {
        if (isLoading) return;
        isLoading = true;
        const timestampElem = document.getElementById('dataTimestamp');
        const statsPanel = document.getElementById('statsPanel');
        try {
            timestampElem.innerHTML = '⏳ 请求行情中...';
            let url = useProxy ? CORS_PROXY + API_ORIGIN : API_ORIGIN;
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            if (result.code !== 200 || !result.names || !result.values) {
                throw new Error(result.msg || '数据格式异常');
            }
            rawData.names = result.names;
            rawData.values = result.values.map(v => Number(v));
            const now = new Date();
            timestampElem.innerHTML = `🕒 最新行情 ${now.toLocaleTimeString()}${useProxy ? ' (代理)' : ''}`;
            updateStatsPanel();
            renderChart(currentChartType);
        } catch (error) {
            console.error('请求失败:', error);
            // 如果代理模式失败，尝试无代理直接请求一次
            if (useProxy) {
                useProxy = false;
                timestampElem.innerHTML = '⚠️ 代理失效，尝试直连...';
                await fetchStockData(); // 递归重试一次直连
                return;
            } else {
                // 直连也失败，提示用户
                timestampElem.innerHTML = '❌ 数据加载失败 (CORS)';
                statsPanel.innerHTML = `<div class="error-msg">❌ 获取虚拟股票失败: ${error.message}<br>
                原因：API 未允许跨域访问。<br>
                解决方法：<br>
                1️⃣ 安装浏览器 CORS 插件（临时）<br>
                2️⃣ 自建 Cloudflare Worker 代理（推荐）<br>
                3️⃣ 点击下方按钮使用备用代理（不稳定）</div>
                <button id="retryProxyBtn" style="margin-top:10px; background:#2c5a6e; color:white; border:none; padding:6px 12px; border-radius:30px;">🔄 重试代理模式</button>`;
                document.getElementById('retryProxyBtn')?.addEventListener('click', () => {
                    useProxy = true;
                    fetchStockData();
                });
                if (currentChart) { currentChart.destroy(); currentChart = null; }
            }
        } finally {
            isLoading = false;
        }
    }

    function updateStatsPanel() {
        if (!rawData.values.length || !rawData.names.length) {
            document.getElementById('statsPanel').innerHTML = '<div>暂无有效行情数据</div>';
            return;
        }
        const values = rawData.values;
        const names = rawData.names;
        const total = values.reduce((a,b) => a + b, 0);
        const maxVal = Math.max(...values);
        const maxIdx = values.indexOf(maxVal);
        const maxName = names[maxIdx] || '—';
        const minVal = Math.min(...values);
        const minIdx = values.indexOf(minVal);
        const minName = names[minIdx] || '—';
        const avgVal = (total / values.length).toFixed(0);
        const firstVal = values[0] || 1;
        const lastVal = values[values.length-1] || 1;
        const changePercent = ((lastVal - firstVal) / firstVal * 100).toFixed(2);
        const changeSymbol = changePercent >= 0 ? '📈 +' : '📉 ';
        const statsHtml = `
            <div class="stat-card"><span class="stat-label">🏦 成份股数</span><span class="stat-value">${values.length}</span></div>
            <div class="stat-card"><span class="stat-label">💰 总值(模拟)</span><span class="stat-value">${formatValue(total)}</span></div>
            <div class="stat-card"><span class="stat-label">🏆 最高价股</span><span class="stat-value">${escapeHtml(maxName)} : ${formatValue(maxVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📉 最低价股</span><span class="stat-value">${escapeHtml(minName)} : ${formatValue(minVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📊 平均估值</span><span class="stat-value">${formatValue(avgVal)}</span></div>
            <div class="stat-card"><span class="stat-label">🔄 首尾变化</span><span class="stat-value">${changeSymbol}${Math.abs(changePercent)}%</span></div>
        `;
        document.getElementById('statsPanel').innerHTML = statsHtml;
    }

    function renderChart(type) {
        if (!rawData.names.length || !rawData.values.length) return;
        const labels = rawData.names.slice();
        const dataValues = rawData.values.slice();
        const barColors = dataValues.map((_, idx) => `hsla(${(idx * 25) % 360}, 65%, 55%, 0.85)`);
        let dataset = [];
        if (type === 'bar') {
            dataset = [{
                label: '虚拟市值 / 积分',
                data: dataValues,
                backgroundColor: barColors,
                borderColor: 'rgba(44, 90, 110, 0.4)',
                borderWidth: 1,
                borderRadius: 6,
                barPercentage: 0.7,
            }];
        } else {
            dataset = [{
                label: '虚拟股票价值曲线',
                data: dataValues,
                borderColor: '#2c5a6e',
                backgroundColor: 'rgba(44, 90, 110, 0.08)',
                borderWidth: 3,
                pointRadius: 3.5,
                pointBackgroundColor: '#2c5a6e',
                pointBorderColor: '#ffffff',
                tension: 0.2,
                fill: true,
            }];
        }
        const chartConfig = {
            type: type,
            data: { labels, datasets: dataset },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.dataset.label}: ${formatValue(ctx.raw)}`
                        }
                    },
                    legend: { position: 'top', labels: { font: { size: 12, weight: 'bold' } } }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: '指数 / 市值' }, ticks: { callback: (val) => formatValue(val) } },
                    x: { ticks: { maxRotation: 45, minRotation: 35, autoSkip: true, maxTicksLimit: 18, font: { size: 9 } } }
                }
            }
        };
        if (currentChart) currentChart.destroy();
        const ctx = document.getElementById('stockChart').getContext('2d');
        currentChart = new Chart(ctx, chartConfig);
    }

    function setChartType(type) {
        if (type !== 'bar' && type !== 'line') return;
        currentChartType = type;
        document.getElementById('barBtn').classList.toggle('active', type === 'bar');
        document.getElementById('lineBtn').classList.toggle('active', type === 'line');
        if (rawData.values.length) renderChart(currentChartType);
    }

    async function init() {
        document.getElementById('barBtn').addEventListener('click', () => setChartType('bar'));
        document.getElementById('lineBtn').addEventListener('click', () => setChartType('line'));
        document.getElementById('refreshDataBtn').addEventListener('click', async () => {
            useProxy = true;  // 刷新时重置为代理模式
            await fetchStockData();
        });
        await fetchStockData();
    }
    init();
</script>
</body>
</html>
