<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NB虚拟股票行情（数据来自Orgent虚拟投资）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            padding: 28px 32px 16px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.5);
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #5a6e7c;
            margin-top: 8px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .update-badge {
            background: #eef2f6;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a6e;
        }
        .toolbar {
            padding: 20px 32px 12px 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #eef2f8;
            background: #ffffffd9;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            background: #f0f4f9;
            padding: 6px;
            border-radius: 60px;
        }
        .chart-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            color: #3e5a6b;
        }
        .chart-btn.active {
            background: #2c5a6e;
            color: white;
            box-shadow: 0 4px 8px rgba(44, 90, 110, 0.2);
        }
        .chart-btn:not(.active):hover {
            background: #e0e8f0;
            color: #1e3b4a;
        }
        .refresh-btn {
            background: #2c5a6e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .refresh-btn:hover {
            background: #1f4456;
            transform: scale(0.96);
        }
        .chart-wrapper {
            padding: 20px 32px 32px 32px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            min-height: 500px;
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 8px 8px 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }
        canvas {
            max-height: 520px;
            width: 100%;
        }
        .stats {
            padding: 16px 32px 28px 32px;
            border-top: 1px solid #eef2f8;
            background: #fbfdff;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.85rem;
            color: #2c5a6e;
        }
        .stat-card {
            background: #f5f9fe;
            border-radius: 28px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-label {
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .stat-value {
            font-weight: 700;
            color: #1f4d62;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .error-msg {
            color: #c7362b;
            background: #ffeae8;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        @media (max-width: 680px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .refresh-btn { margin-left: 0; }
            .chart-wrapper { padding: 16px; }
            .header h1 { font-size: 1.5rem; }
        }
        footer {
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #6f8e9f;
        }
        .orgent-link {
            background: #2c5a6e;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-block;
        }
        .orgent-link:hover {
            background: #1f4456;
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <div class="dashboard">
    <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <h1 style="margin: 0;">📊 NB虚拟股票行情（数据来自Orgent虚拟投资）</h1>
        <a href="https://orgent.pythonanywhere.com/stocks/" target="_blank" rel="noopener noreferrer" class="orgent-link">🔗 访问 Orgent虚拟投资页面</a>
    </div>
    <div class="sub">
        <span>📈 股票/概念指数 动态追踪</span>
        <span class="update-badge" id="dataTimestamp">⚡ 数据加载中...</span>
    </div>
</div>

    <div class="toolbar">
        <div class="btn-group">
            <button class="chart-btn active" id="barBtn">📊 柱状图</button>
            <button class="chart-btn" id="lineBtn">📈 折线图</button>
        </div>
        <button class="refresh-btn" id="refreshDataBtn">🔄 立即刷新</button>
    </div>

    <div class="chart-wrapper">
        <div class="canvas-container">
            <canvas id="stockChart" width="1100" height="500"></canvas>
        </div>
    </div>

    <div class="stats" id="statsPanel">
        <div>📡 正在从服务器获取股票估值……</div>
    </div>
</div>
<footer>数据来源：<a href="https://orgent.pythonanywhere.com" target="_blank" rel="noopener noreferrer">Orgent网站</a> API | 通过 Deno Deploy 专属代理 | 自动刷新周期：10秒</footer>

<script>
    // ==================== 全局变量 ====================
    let currentChart = null;
    let currentChartType = 'bar';
    let rawData = { names: [], values: [] };
    let isLoading = false;
    let autoRefreshTimer = null;          // 定时器ID
    let refreshInterval = 10000;          // 10秒 (可调整)

    // ==================== 配置区域（已配置好你的 Deno Deploy 代理） ====================
    const PROXY_URL = 'https://tidy-goose-75.nb-channel.deno.net/?url=';
    const API_URL = 'https://orgent.pythonanywhere.com/api/GpValues';

    // ==================== 辅助函数 ====================
    function formatValue(num) {
    if (num === undefined || num === null) return '0';
    const n = Number(num);
    if (isNaN(n)) return '0';
    return n.toLocaleString();
}

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 更新时间戳显示（包含自动刷新状态）
    function updateTimestamp(status = 'success') {
        const elem = document.getElementById('dataTimestamp');
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        if (status === 'loading') {
            elem.innerHTML = `⏳ 刷新中...`;
        } else if (status === 'error') {
            elem.innerHTML = `⚠️ 上次更新失败 (${timeStr})`;
        } else {
            elem.innerHTML = `🕒 自动刷新: 10秒 | 最新: ${timeStr}`;
        }
    }

    // ==================== 数据获取 ====================
    async function fetchStockData(isAuto = false) {
        if (isLoading) return;
        isLoading = true;
        
        if (!isAuto) {
            // 手动刷新时，短暂显示“手动刷新中”，但不清除自动刷新定时器
            updateTimestamp('loading');
        } else {
            updateTimestamp('loading');
        }
        
        const statsPanel = document.getElementById('statsPanel');
        try {
            const proxyFullUrl = PROXY_URL + encodeURIComponent(API_URL);
            const response = await fetch(proxyFullUrl);
            
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            
            const result = await response.json();
            
            if (result.code !== 200 || !result.names || !result.values) {
                throw new Error(result.msg || '数据格式异常');
            }
            
            rawData.names = result.names;
            rawData.values = result.values.map(v => Number(v));
            
            updateTimestamp('success');
            updateStatsPanel();
            renderChart(currentChartType);
        } catch (error) {
            console.error('API 请求失败:', error);
            updateTimestamp('error');
            statsPanel.innerHTML = `<div class="error-msg">❌ 获取失败: ${error.message}<br>将自动重试</div>`;
            if (currentChart) {
                currentChart.destroy();
                currentChart = null;
            }
        } finally {
            isLoading = false;
        }
    }

    // ==================== 统计面板 ====================
    function updateStatsPanel() {
        if (!rawData.values.length || !rawData.names.length) {
            document.getElementById('statsPanel').innerHTML = '<div>暂无有效行情数据</div>';
            return;
        }
        const values = rawData.values;
        const names = rawData.names;
        const total = values.reduce((a,b) => a + b, 0);
        const maxVal = Math.max(...values);
        const maxIdx = values.indexOf(maxVal);
        const maxName = names[maxIdx] || '—';
        const minVal = Math.min(...values);
        const minIdx = values.indexOf(minVal);
        const minName = names[minIdx] || '—';
        const avgVal = (total / values.length).toFixed(0);
        const firstVal = values[0] || 1;
        const lastVal = values[values.length-1] || 1;
        const changePercent = ((lastVal - firstVal) / firstVal * 100).toFixed(2);
        const changeSymbol = changePercent >= 0 ? '📈 +' : '📉 ';
        
        const statsHtml = `
            <div class="stat-card"><span class="stat-label">🏦 成份股数</span><span class="stat-value">${values.length}</span></div>
            <div class="stat-card"><span class="stat-label">💰 总值(模拟)</span><span class="stat-value">${formatValue(total)}</span></div>
            <div class="stat-card"><span class="stat-label">🏆 最高价股</span><span class="stat-value">${escapeHtml(maxName)} : ${formatValue(maxVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📉 最低价股</span><span class="stat-value">${escapeHtml(minName)} : ${formatValue(minVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📊 平均估值</span><span class="stat-value">${formatValue(avgVal)}</span></div>
            <div class="stat-card"><span class="stat-label">🔄 首尾变化</span><span class="stat-value">${changeSymbol}${Math.abs(changePercent)}%</span></div>
        `;
        document.getElementById('statsPanel').innerHTML = statsHtml;
    }

    // ==================== 图表渲染 ====================
    function renderChart(type) {
        if (!rawData.names.length || !rawData.values.length) {
            console.warn('无数据，无法绘图');
            return;
        }
        const labels = rawData.names.slice();
        const dataValues = rawData.values.slice();
        
        const barColors = dataValues.map((_, idx) => {
            const hue = (idx * 25) % 360;
            return `hsla(${hue}, 65%, 55%, 0.85)`;
        });
        const lineBorderColor = '#2c5a6e';
        
        let dataset = [];
        if (type === 'bar') {
            dataset = [{
                label: '虚拟市值',
                data: dataValues,
                backgroundColor: barColors,
                borderColor: 'rgba(44, 90, 110, 0.4)',
                borderWidth: 1,
                borderRadius: 6,
                barPercentage: 0.7,
                categoryPercentage: 0.85,
            }];
        } else {
            dataset = [{
                label: '虚拟股票价值曲线',
                data: dataValues,
                borderColor: lineBorderColor,
                backgroundColor: 'rgba(44, 90, 110, 0.08)',
                borderWidth: 3,
                pointRadius: 3.5,
                pointHoverRadius: 6,
                pointBackgroundColor: '#2c5a6e',
                pointBorderColor: '#ffffff',
                tension: 0.2,
                fill: true,
            }];
        }
        
        const chartConfig = {
            type: type,
            data: { labels, datasets: dataset },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let val = context.raw;
                                return `${context.dataset.label}: ${formatValue(val)}`;
                            }
                        },
                        backgroundColor: '#1f3e4c',
                        titleColor: '#f0f3f7'
                    },
                    legend: {
                        position: 'top',
                        labels: { font: { size: 12, weight: 'bold' }, color: '#2c5a6e' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#e3e9ef' },
                        title: { display: true, text: '市值 (点)', color: '#5d7f8f' },
                        ticks: { callback: (val) => formatValue(val) }
                    },
                    x: {
                        ticks: {
                            maxRotation: 45,
                            minRotation: 35,
                            autoSkip: true,
                            maxTicksLimit: 18,
                            font: { size: 9 }
                        },
                        title: { display: true, text: '股票名称', color: '#5d7f8f' }
                    }
                },
                transitions: {
                    active: { animation: { duration: 400 } }
                }
            }
        };
        
        if (currentChart) {
            currentChart.destroy();
            currentChart = null;
        }
        
        const canvasElem = document.getElementById('stockChart');
        const ctx = canvasElem.getContext('2d');
        currentChart = new Chart(ctx, chartConfig);
    }
    
    // ==================== 图表类型切换 ====================
    function setChartType(type) {
        if (type !== 'bar' && type !== 'line') return;
        currentChartType = type;
        const barBtn = document.getElementById('barBtn');
        const lineBtn = document.getElementById('lineBtn');
        if (type === 'bar') {
            barBtn.classList.add('active');
            lineBtn.classList.remove('active');
        } else {
            lineBtn.classList.add('active');
            barBtn.classList.remove('active');
        }
        if (rawData.values.length > 0) {
            renderChart(currentChartType);
        }
    }
    
    // ==================== 自动刷新控制 ====================
    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(() => {
            fetchStockData(true);  // 自动刷新
        }, refreshInterval);
    }

    function stopAutoRefresh() {
        if (autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
    }

    // 页面可见性变化时：如果页面隐藏，停止自动刷新以节省资源；显示时重新启动
    function handleVisibilityChange() {
        if (document.hidden) {
            stopAutoRefresh();
        } else {
            startAutoRefresh();
        }
    }

    // ==================== 初始化 ====================
    document.getElementById('barBtn').addEventListener('click', () => setChartType('bar'));
    document.getElementById('lineBtn').addEventListener('click', () => setChartType('line'));
    document.getElementById('refreshDataBtn').addEventListener('click', () => fetchStockData(false));
    
    // 首次加载数据
    fetchStockData(false).then(() => {
        // 数据加载完成后启动自动刷新
        startAutoRefresh();
    });
    
    // 监听页面可见性变化
    document.addEventListener('visibilitychange', handleVisibilityChange);
    
    // 页面关闭前清理定时器（可选，避免后台持续运行）
    window.addEventListener('beforeunload', () => {
        stopAutoRefresh();
    });
</script>
</body>
</html>
