<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>虚拟股票行情 - 数据可视化看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            font-family: 'Segoe UI', 'Roboto', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .dashboard {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .header {
            padding: 28px 32px 16px 32px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #2c5a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .sub {
            color: #5a6e7c;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .update-badge {
            background: #eef2f6;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c5a6e;
        }
        .toolbar {
            padding: 20px 32px 12px 32px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #eef2f8;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            background: #f0f4f9;
            padding: 6px;
            border-radius: 60px;
        }
        .chart-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            color: #3e5a6b;
        }
        .chart-btn.active {
            background: #2c5a6e;
            color: white;
        }
        .refresh-btn {
            background: #2c5a6e;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-left: auto;
        }
        .chart-wrapper { padding: 20px 32px 32px 32px; }
        .canvas-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 16px 8px 8px 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
        }
        canvas { max-height: 520px; width: 100%; }
        .stats {
            padding: 16px 32px 28px 32px;
            border-top: 1px solid #eef2f8;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.85rem;
            color: #2c5a6e;
        }
        .stat-card {
            background: #f5f9fe;
            border-radius: 28px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stat-label { font-weight: 600; }
        .stat-value {
            font-weight: 700;
            color: #1f4d62;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
        }
        .error-msg {
            color: #c7362b;
            background: #ffeae8;
            border-radius: 40px;
            padding: 8px 20px;
        }
        @media (max-width: 680px) {
            .toolbar { flex-direction: column; align-items: stretch; }
            .refresh-btn { margin-left: 0; }
            .header h1 { font-size: 1.5rem; }
        }
        footer { text-align: center; margin-top: 16px; font-size: 0.7rem; color: #6f8e9f; }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <h1>📊 NB虚拟证券 · 实时行情看板</h1>
        <div class="sub">
            <span>📈 股票/概念指数 动态追踪</span>
            <span class="update-badge" id="dataTimestamp">⚡ 数据加载中...</span>
        </div>
    </div>
    <div class="toolbar">
        <div class="btn-group">
            <button class="chart-btn active" id="barBtn">📊 柱状图</button>
            <button class="chart-btn" id="lineBtn">📈 折线图</button>
        </div>
        <button class="refresh-btn" id="refreshDataBtn">🔄 刷新行情</button>
    </div>
    <div class="chart-wrapper">
        <div class="canvas-container">
            <canvas id="stockChart" width="1100" height="500"></canvas>
        </div>
    </div>
    <div class="stats" id="statsPanel">
        <div>📡 正在从服务器获取股票估值……</div>
    </div>
</div>
<footer>数据来源：Orgent 行情 API | 使用 allorigins.win 代理解决跨域</footer>

<script>
    let currentChart = null;
    let currentChartType = 'bar';
    let rawData = { names: [], values: [] };
    let isLoading = false;

    const API_URL = 'https://orgent.pythonanywhere.com/api/GpValues';
    const PROXY_URL = 'https://api.allorigins.win/raw?url=';

    function formatValue(num) {
        if (num === undefined || num === null) return '0';
        const n = Number(num);
        if (isNaN(n)) return '0';
        if (n >= 100000000) return (n / 100000000).toFixed(1) + '亿';
        if (n >= 10000) return (n / 10000).toFixed(1) + '万';
        return n.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    async function fetchStockData() {
        if (isLoading) return;
        isLoading = true;
        const timestampElem = document.getElementById('dataTimestamp');
        const statsPanel = document.getElementById('statsPanel');
        try {
            timestampElem.innerHTML = '⏳ 请求行情中...';
            const proxyFullUrl = PROXY_URL + encodeURIComponent(API_URL);
            const response = await fetch(proxyFullUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const result = await response.json();
            // allorigins.win 返回的数据在 contents 字段内，需要再解析一次
            let actualData;
            if (result.contents) {
                actualData = JSON.parse(result.contents);
            } else {
                actualData = result;
            }
            if (actualData.code !== 200 || !actualData.names || !actualData.values) {
                throw new Error(actualData.msg || '数据格式异常');
            }
            rawData.names = actualData.names;
            rawData.values = actualData.values.map(v => Number(v));
            timestampElem.innerHTML = `🕒 最新行情 ${new Date().toLocaleTimeString()}`;
            updateStatsPanel();
            renderChart(currentChartType);
        } catch (error) {
            console.error(error);
            timestampElem.innerHTML = '⚠️ 数据加载失败';
            statsPanel.innerHTML = `<div class="error-msg">❌ 获取失败: ${error.message}<br>请点击刷新重试</div>`;
            if (currentChart) { currentChart.destroy(); currentChart = null; }
        } finally {
            isLoading = false;
        }
    }

    function updateStatsPanel() {
        if (!rawData.values.length) {
            document.getElementById('statsPanel').innerHTML = '<div>暂无数据</div>';
            return;
        }
        const values = rawData.values;
        const names = rawData.names;
        const total = values.reduce((a,b) => a + b, 0);
        const maxVal = Math.max(...values);
        const maxIdx = values.indexOf(maxVal);
        const maxName = names[maxIdx];
        const minVal = Math.min(...values);
        const minIdx = values.indexOf(minVal);
        const minName = names[minIdx];
        const avgVal = (total / values.length).toFixed(0);
        const firstVal = values[0];
        const lastVal = values[values.length-1];
        const changePercent = ((lastVal - firstVal) / firstVal * 100).toFixed(2);
        const changeSymbol = changePercent >= 0 ? '📈 +' : '📉 ';
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><span class="stat-label">🏦 成份股数</span><span class="stat-value">${values.length}</span></div>
            <div class="stat-card"><span class="stat-label">💰 总值(模拟)</span><span class="stat-value">${formatValue(total)}</span></div>
            <div class="stat-card"><span class="stat-label">🏆 最高价股</span><span class="stat-value">${escapeHtml(maxName)} : ${formatValue(maxVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📉 最低价股</span><span class="stat-value">${escapeHtml(minName)} : ${formatValue(minVal)}</span></div>
            <div class="stat-card"><span class="stat-label">📊 平均估值</span><span class="stat-value">${formatValue(avgVal)}</span></div>
            <div class="stat-card"><span class="stat-label">🔄 首尾变化</span><span class="stat-value">${changeSymbol}${Math.abs(changePercent)}%</span></div>
        `;
    }

    function renderChart(type) {
        if (!rawData.names.length) return;
        const labels = rawData.names;
        const dataValues = rawData.values;
        const barColors = dataValues.map((_, idx) => `hsla(${(idx * 25) % 360}, 65%, 55%, 0.85)`);
        let dataset;
        if (type === 'bar') {
            dataset = [{
                label: '虚拟市值 / 积分',
                data: dataValues,
                backgroundColor: barColors,
                borderRadius: 6,
                barPercentage: 0.7,
            }];
        } else {
            dataset = [{
                label: '虚拟股票价值曲线',
                data: dataValues,
                borderColor: '#2c5a6e',
                backgroundColor: 'rgba(44, 90, 110, 0.08)',
                borderWidth: 3,
                pointRadius: 3.5,
                tension: 0.2,
                fill: true,
            }];
        }
        const config = {
            type: type,
            data: { labels, datasets: dataset },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatValue(ctx.raw)}` } },
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: '指数 / 市值' }, ticks: { callback: (val) => formatValue(val) } },
                    x: { ticks: { maxRotation: 45, autoSkip: true, maxTicksLimit: 18 } }
                }
            }
        };
        if (currentChart) currentChart.destroy();
        const ctx = document.getElementById('stockChart').getContext('2d');
        currentChart = new Chart(ctx, config);
    }

    function setChartType(type) {
        currentChartType = type;
        document.getElementById('barBtn').classList.toggle('active', type === 'bar');
        document.getElementById('lineBtn').classList.toggle('active', type === 'line');
        if (rawData.values.length) renderChart(currentChartType);
    }

    document.getElementById('barBtn').addEventListener('click', () => setChartType('bar'));
    document.getElementById('lineBtn').addEventListener('click', () => setChartType('line'));
    document.getElementById('refreshDataBtn').addEventListener('click', fetchStockData);
    fetchStockData();
</script>
</body>
</html>
