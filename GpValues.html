<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NB虚拟股票行情（数据来自Orgent API）</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/common.js"></script>
    <style>
        /* 图表容器及特有样式 */
        .chart-wrapper {
            padding: 20px 32px 32px 32px;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            min-height: 550px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 16px 8px 8px 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            transition: background 0.3s ease;
        }
        canvas {
            max-height: 550px;
            width: 100%;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 20px;
            padding: 16px 32px 28px 32px;
            border-top: 1px solid var(--card-border);
            background: var(--card-bg);
        }
        .stat-card {
            background: var(--count-bg);
            border-radius: 28px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        .stat-label {
            font-weight: 600;
        }
        .stat-value {
            font-weight: 700;
            color: var(--status-border);
            background: var(--card-bg);
            padding: 4px 12px;
            border-radius: 30px;
        }
        .error-msg {
            color: #c7362b;
            background: #ffeae8;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 0.85rem;
        }
        body.dark-mode .error-msg {
            background: #3b1e1a;
            color: #f87171;
        }
        .orgent-link {
            background: var(--nav-btn-bg);
            color: var(--nav-btn-text);
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-block;
        }
        .orgent-link:hover {
            background: var(--nav-btn-hover-bg);
            color: var(--nav-btn-hover-text);
        }
        /* 图表切换按钮样式（只改颜色，保留形状） */
        .toolbar {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            background: var(--nav-btn-bg);
            padding: 6px;
            border-radius: 60px;
        }
        .chart-btn {
            background: transparent;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--nav-btn-text);
        }
        .chart-btn.active {
            background: #00a1d6;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 161, 214, 0.3);
        }
        .chart-btn:hover:not(.active) {
            background: rgba(0, 161, 214, 0.1);
            color: var(--nav-btn-hover-text);
        }
        .refresh-btn {
            background: var(--nav-btn-hover-bg);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            filter: brightness(0.9);
            transform: scale(0.96);
        }
        @media (max-width: 680px) {
            .chart-wrapper { padding: 16px; }
            .canvas-container { min-height: 400px; }
            canvas { max-height: 400px; }
            .stats { padding: 16px; gap: 16px; }
            .btn-group { gap: 8px; }
            .chart-btn { padding: 6px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 NB频道官网</h1>
    <div class="author-info" id="authorInfo">UP主：NB搞事局</div>
    <div class="nav-container">
        <div class="nav-links">
            <a href="index.html" class="nav-btn">首页</a>
            <a href="videos.html" class="nav-btn">视频</a>
            <a href="about.html" class="nav-btn">关于</a>
            <a href="changelog.html" class="nav-btn">更新日志</a>
            <a href="product.html" class="nav-btn">我的产品</a>
            <a href="APP.html" class="nav-btn">软件/APP下载</a>
        </div>
        <div class="nav-actions">
            <a href="comments-beta.html" class="nav-btn">💬 评论区Beta0.1版本</a>
            <a href="GpValues.html" class="nav-btn active">📈 虚拟股票（数据来自Orgent API）</a>
        </div>
    </div>

    <div class="home-card" style="padding-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
            <h2 style="margin: 0; color: var(--status-border);">📊 虚拟股票行情（数据来自Orgent API）</h2>
            <a href="https://orgent.pythonanywhere.com/stocks/" target="_blank" rel="noopener noreferrer" class="orgent-link">🔗 访问 Orgent虚拟投资页面</a>
        </div>
        <div class="sub" style="color: var(--count-text); margin-bottom: 16px;">
            <span>📈 股票/概念指数 动态追踪</span>
            <span class="update-badge" id="dataTimestamp" style="background: var(--count-bg); padding: 4px 12px; border-radius: 60px;">⚡ 数据加载中...</span>
        </div>

        <div class="toolbar">
            <div class="btn-group">
                <button class="chart-btn active" id="barBtn">📊 柱状图</button>
                <button class="chart-btn" id="lineBtn">📈 折线图</button>
                <button class="chart-btn" id="pieBtn">🥧 扇形图</button>
            </div>
            <button class="refresh-btn" id="refreshDataBtn">🔄 立即刷新</button>
        </div>

        <div class="chart-wrapper">
            <div class="canvas-container">
                <canvas id="stockChart" width="1100" height="550"></canvas>
            </div>
        </div>

        <div class="stats" id="statsPanel">
            <div>📡 正在从服务器获取股票估值……</div>
        </div>
    </div>
</div>

<div class="site-stats">
    <div class="stats-container" id="siteStats"></div>
    <p style="margin-top: 12px;">数据来源：<a href="https://orgent.pythonanywhere.com" target="_blank" style="color: var(--status-border);">Orgent网站</a> API | 通过 Deno Deploy 专属代理 | 自动刷新周期：10秒</p>
</div>

<div class="fixed-buttons">
    <button class="theme-toggle-fixed" id="themeToggleFixed" onclick="toggleTheme()">🌙</button>
    <div class="back-to-top" id="backToTop" onclick="scrollToTop()">↑</div>
</div>

<script>
    // ==================== 股票页面独立逻辑 ====================
    let currentChart = null;
    let currentChartType = 'bar';   // 'bar', 'line', 'pie'
    let rawData = { names: [], values: [] };
    let isLoading = false;
    let autoRefreshTimer = null;
    let refreshInterval = 10000; // 10秒

    const PROXY_URL = 'https://tidy-goose-75.nb-channel.deno.net/?url=';
    const API_URL = 'https://orgent.pythonanywhere.com/api/GpValues';

    function formatValue(num) {
        if (num === undefined || num === null) return '0';
        const n = Number(num);
        if (isNaN(n)) return '0';
        return n.toLocaleString();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function updateTimestamp(status = 'success') {
        const elem = document.getElementById('dataTimestamp');
        const now = new Date();
        const timeStr = now.toLocaleTimeString();
        if (status === 'loading') elem.innerHTML = `⏳ 刷新中...`;
        else if (status === 'error') elem.innerHTML = `⚠️ 上次更新失败 (${timeStr})`;
        else elem.innerHTML = `🕒 自动刷新: 10秒 | 最新: ${timeStr}`;
    }

    // 获取当前主题的图表配色（响应全局 body.dark-mode 类）
    function getChartColors() {
        const isDark = document.body.classList.contains('dark-mode');
        return {
            gridColor: isDark ? '#3f465f' : '#e3e9ef',
            titleColor: isDark ? '#9ca3af' : '#5d7f8f',
            tickColor: isDark ? '#9ca3af' : '#5d7f8f',
            legendColor: isDark ? '#cbd5e6' : '#2c5a6e',
            borderColor: isDark ? '#60a5fa' : '#2c5a6e',
            pointBackground: isDark ? '#60a5fa' : '#2c5a6e',
            tooltipBg: isDark ? '#1f2937' : '#1f3e4c',
            tooltipTitle: isDark ? '#f3f4f6' : '#f0f3f7'
        };
    }

    // 根据类型渲染图表
    function renderChart(type) {
        if (!rawData.names.length || !rawData.values.length) return;
        const labels = rawData.names.slice();
        const dataValues = rawData.values.slice();
        const colors = getChartColors();
        
        // 公共颜色生成（用于柱状图/饼图）
        const barColors = dataValues.map((_, idx) => `hsla(${(idx * 25) % 360}, 65%, 55%, 0.85)`);
        
        let chartConfig = null;
        
        if (type === 'bar') {
            chartConfig = {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '虚拟市值',
                        data: dataValues,
                        backgroundColor: barColors,
                        borderColor: 'rgba(44, 90, 110, 0.4)',
                        borderWidth: 1,
                        borderRadius: 6,
                        barPercentage: 0.7,
                        categoryPercentage: 0.85,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatValue(ctx.raw)}` }, backgroundColor: colors.tooltipBg, titleColor: colors.tooltipTitle },
                        legend: { position: 'top', labels: { font: { size: 12 }, color: colors.legendColor } }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: colors.gridColor }, title: { display: true, text: '市值 (点)', color: colors.titleColor }, ticks: { color: colors.tickColor, callback: v => formatValue(v) } },
                        x: { ticks: { color: colors.tickColor, maxRotation: 45, minRotation: 35, autoSkip: false, font: { size: 9 } }, title: { display: true, text: '股票名称', color: colors.titleColor } }
                    }
                }
            };
        } 
        else if (type === 'line') {
            chartConfig = {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '虚拟股票价值曲线',
                        data: dataValues,
                        borderColor: colors.borderColor,
                        backgroundColor: document.body.classList.contains('dark-mode') ? 'rgba(59,130,246,0.1)' : 'rgba(44, 90, 110, 0.08)',
                        borderWidth: 3,
                        pointRadius: 3.5,
                        pointBackgroundColor: colors.pointBackground,
                        pointBorderColor: '#ffffff',
                        tension: 0.2,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${formatValue(ctx.raw)}` }, backgroundColor: colors.tooltipBg, titleColor: colors.tooltipTitle },
                        legend: { position: 'top', labels: { font: { size: 12 }, color: colors.legendColor } }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: colors.gridColor }, title: { display: true, text: '市值 (点)', color: colors.titleColor }, ticks: { color: colors.tickColor, callback: v => formatValue(v) } },
                        x: { ticks: { color: colors.tickColor, maxRotation: 45, minRotation: 35, autoSkip: false, font: { size: 9 } }, title: { display: true, text: '股票名称', color: colors.titleColor } }
                    }
                }
            };
        }
        else if (type === 'pie') {
            chartConfig = {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: barColors,
                        borderColor: colors.borderColor,
                        borderWidth: 1,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${formatValue(ctx.raw)} (${((ctx.raw / dataValues.reduce((a,b)=>a+b,0))*100).toFixed(1)}%)` }, backgroundColor: colors.tooltipBg, titleColor: colors.tooltipTitle },
                        legend: { position: 'right', labels: { font: { size: 11 }, color: colors.legendColor, boxWidth: 12 } }
                    },
                    // 饼图没有坐标轴
                }
            };
        }
        
        if (chartConfig) {
            if (currentChart) currentChart.destroy();
            currentChart = new Chart(document.getElementById('stockChart').getContext('2d'), chartConfig);
        }
    }

    async function fetchStockData(isAuto = false) {
        if (isLoading) return;
        isLoading = true;
        updateTimestamp('loading');
        const statsDiv = document.getElementById('statsPanel');
        try {
            const url = PROXY_URL + encodeURIComponent(API_URL);
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (json.code !== 200 || !json.names || !json.values) throw new Error('数据格式异常');
            rawData.names = json.names;
            rawData.values = json.values.map(v => Number(v));
            updateTimestamp('success');
            updateStatsPanel();
            renderChart(currentChartType);
        } catch (err) {
            console.error(err);
            updateTimestamp('error');
            statsDiv.innerHTML = `<div class="error-msg">❌ 获取失败: ${err.message}<br>将自动重试</div>`;
            if (currentChart) { currentChart.destroy(); currentChart = null; }
        } finally {
            isLoading = false;
        }
    }

    function updateStatsPanel() {
        if (!rawData.values.length) {
            document.getElementById('statsPanel').innerHTML = '<div>暂无数据</div>';
            return;
        }
        const vals = rawData.values, names = rawData.names;
        const total = vals.reduce((a,b)=>a+b,0);
        const max = Math.max(...vals), maxIdx = vals.indexOf(max);
        const min = Math.min(...vals), minIdx = vals.indexOf(min);
        const avg = (total/vals.length).toFixed(0);
        const first = vals[0], last = vals[vals.length-1];
        const change = ((last - first)/first*100).toFixed(2);
        const changeSym = change >= 0 ? '📈 +' : '📉 ';
        document.getElementById('statsPanel').innerHTML = `
            <div class="stat-card"><span class="stat-label">🏦 成份股数</span><span class="stat-value">${vals.length}</span></div>
            <div class="stat-card"><span class="stat-label">💰 总值(模拟)</span><span class="stat-value">${formatValue(total)}</span></div>
            <div class="stat-card"><span class="stat-label">🏆 最高价股</span><span class="stat-value">${escapeHtml(names[maxIdx])} : ${formatValue(max)}</span></div>
            <div class="stat-card"><span class="stat-label">📉 最低价股</span><span class="stat-value">${escapeHtml(names[minIdx])} : ${formatValue(min)}</span></div>
            <div class="stat-card"><span class="stat-label">📊 平均估值</span><span class="stat-value">${formatValue(avg)}</span></div>
            <div class="stat-card"><span class="stat-label">🔄 首尾变化</span><span class="stat-value">${changeSym}${Math.abs(change)}%</span></div>
        `;
    }

    function setChartType(type) {
        if (!['bar','line','pie'].includes(type)) return;
        currentChartType = type;
        document.getElementById('barBtn').classList.toggle('active', type === 'bar');
        document.getElementById('lineBtn').classList.toggle('active', type === 'line');
        document.getElementById('pieBtn').classList.toggle('active', type === 'pie');
        if (rawData.values.length) renderChart(currentChartType);
    }

    // 自动刷新控制
    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(() => fetchStockData(true), refreshInterval);
    }
    function stopAutoRefresh() {
        if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
    }
    function handleVisibilityChange() {
        if (document.hidden) stopAutoRefresh();
        else startAutoRefresh();
    }

    // 监听全局暗色模式变化（通过 MutationObserver 监听 body 类变化）
    const observer = new MutationObserver(() => {
        if (rawData.values.length) renderChart(currentChartType);
    });
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    // 初始化
    document.getElementById('barBtn').addEventListener('click', () => setChartType('bar'));
    document.getElementById('lineBtn').addEventListener('click', () => setChartType('line'));
    document.getElementById('pieBtn').addEventListener('click', () => setChartType('pie'));
    document.getElementById('refreshDataBtn').addEventListener('click', () => fetchStockData(false));
    
    fetchStockData(false).then(() => startAutoRefresh());
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('beforeunload', stopAutoRefresh);

    // 确保全局函数存在
    if (typeof window.scrollToTop !== 'function') {
        window.scrollToTop = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
    }
    if (typeof updateSiteStats === 'function') updateSiteStats();
</script>
</body>
</html>
